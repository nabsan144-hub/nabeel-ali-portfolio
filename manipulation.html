        </div>

    <div class="max-w-screen-2xl mx-auto px-8 pt-12 pb-16">
        <div class="flex items-center justify-between mb-8">
            <div>
                <a href="portfolio.html" class="text-xs text-zinc-500 hover:text-zinc-700 flex items-center gap-x-1">
                    <i class="fas fa-arrow-left"></i> <span>Back to Portfolio</span>
                </a>
                <h1 class="heading-font text-6xl font-bold tracking-tighter mt-2">Image Manipulation</h1>
                <p class="text-zinc-500 mt-1">12 advanced photo composites</p>
            </div>
            <div class="text-right">
                <span class="px-5 py-2 bg-zinc-100 text-zinc-700 rounded-3xl text-sm font-medium">12 Projects</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="projects-grid"></div>
    </div>

    <div id="project-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-4" onclick="closeModal()">
        <div onclick="event.stopImmediatePropagation()" class="bg-white w-full max-w-5xl max-h-[92vh] overflow-auto rounded-3xl shadow-2xl">
            <div class="p-8 md:p-10">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <div id="modal-category" class="uppercase text-xs tracking-[2px] font-semibold text-zinc-500"></div>
                        <h3 id="modal-title" class="heading-font text-4xl md:text-5xl font-bold tracking-tighter mt-1"></h3>
                    </div>
                    <button onclick="closeModal()" class="text-3xl text-zinc-300 hover:text-zinc-900">×</button>
                </div>
                <div class="grid md:grid-cols-5 gap-8">
                    <div class="md:col-span-3">
                        <img id="modal-image" class="w-full rounded-2xl shadow-xl border border-zinc-100" alt="">
                    </div>
                    <div class="md:col-span-2">
                        <div class="space-y-6">
                            <div>
                                <div class="text-xs uppercase tracking-widest text-zinc-500 mb-1">PROJECT OVERVIEW</div>
                                <div id="modal-description" class="text-lg leading-relaxed text-zinc-700"></div>
                            </div>
                            <div>
                                <div class="text-xs uppercase tracking-widest text-zinc-500 mb-2">KEY DETAILS</div>
                                <div id="modal-details" class="text-sm space-y-1 text-zinc-700"></div>
                            </div>
                            <div>
                                <div class="text-xs uppercase tracking-widest text-zinc-500 mb-2">TOOLS &amp; SKILLS</div>
                                <div id="modal-tools" class="flex flex-wrap gap-2"></div>
                            </div>
                        </div>
                        <div class="mt-8 pt-6 border-t">
                            <a id="modal-behance-link" href="https://www.behance.net/creativenab" target="_blank" rel="noopener noreferrer"
                               class="inline-flex items-center gap-x-2 px-5 py-3 text-sm font-semibold border border-zinc-300 rounded-3xl hover:bg-zinc-50 w-full justify-center">
                                View on Behance <i class="fas fa-external-link-alt text-xs ml-1"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const projects = [
            { id: 31, title: "Aether Watches", category: "manipulation", type: "Image Manipulation", image: "04_Image_Manipulation/01_Aether_Watches.jpg", description: "Luxury watch in ethereal mountain landscape.", details: "Advanced product + environment compositing.", tools: ["Photoshop"], year: "2026" },
            { id: 32, title: "Elysium Spa", category: "manipulation", type: "Image Manipulation", image: "04_Image_Manipulation/02_Elysium_Spa.jpg", description: "Beauty retouch with floating florals.", details: "Flawless beauty retouching + fantasy elements.", tools: ["Photoshop"], year: "2026" },
            { id: 33, title: "Nexus Dynamics", category: "manipulation", type: "Image Manipulation", image: "04_Image_Manipulation/03_Nexus_Dynamics.jpg", description: "Futuristic tech product composite.", details: "Clean product integration with digital effects.", tools: ["Photoshop"], year: "2026" },
            { id: 34, title: "Velora Fashion", category: "manipulation", type: "Image Manipulation", image: "04_Image_Manipulation/04_Velora_Fashion.jpg", description: "High-fashion rooftop editorial.", details: "Advanced clothing and sky compositing.", tools: ["Photoshop"], year: "2026" },
            { id: 35, title: "Crest & Stone", category: "manipulation", type: "Image Manipulation", image: "04_Image_Manipulation/05_Crest_Stone.jpg", description: "Luxury villa on dramatic cliffside.", details: "Architectural and landscape integration.", tools: ["Photoshop"], year: "2026" },
            { id: 36, title: "Bloom Atelier", category: "manipulation", type: "Image Manipulation", image: "04_Image_Manipulation/06_Bloom_Atelier.jpg", description: "Perfume bottle with exploding florals.", details: "Intricate floral compositing and product retouching.", tools: ["Photoshop"], year: "2026" },
            { id: 37, title: "Vanguard Motors", category: "manipulation", type: "Image Manipulation", image: "04_Image_Manipulation/07_Vanguard_Motors.jpg", description: "Sports car in stormy mountain pass.", details: "Dynamic motion and weather compositing.", tools: ["Photoshop"], year: "2026" },
            { id: 38, title: "Aurora Studios", category: "manipulation", type: "Image Manipulation", image: "04_Image_Manipulation/08_Aurora_Studios.jpg", description: "Double exposure aurora portrait.", details: "Clean double exposure technique.", tools: ["Photoshop"], year: "2026" },
            { id: 39, title: "Ember & Forge", category: "manipulation", type: "Image Manipulation", image: "04_Image_Manipulation/09_Ember_Forge.jpg", description: "Gourmet food with dramatic smoke.", details: "Food styling + creative smoke compositing.", tools: ["Photoshop"], year: "2026" },
            { id: 40, title: "Rift Collective", category: "manipulation", type: "Image Manipulation", image: "04_Image_Manipulation/10_Rift_Collective.jpg", description: "Dynamic streetwear motion composite.", details: "Motion trails and urban integration.", tools: ["Photoshop"], year: "2026" },
            { id: 41, title: "Apex Adventures", category: "manipulation", type: "Image Manipulation", image: "04_Image_Manipulation/11_Apex_Adventures.jpg", description: "Epic mountain peak adventure.", details: "Landscape compositing and dramatic lighting.", tools: ["Photoshop"], year: "2026" },
            { id: 42, title: "Lumen Elixirs", category: "manipulation", type: "Image Manipulation", image: "04_Image_Manipulation/12_Lumen_Elixirs.jpg", description: "Magical glowing elixir with crystals.", details: "Advanced magical product compositing.", tools: ["Photoshop"], year: "2026" }
        ];

        function renderProjects() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';
            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card bg-white border border-zinc-100 rounded-3xl overflow-hidden cursor-pointer';
                card.innerHTML = `
                    <div class="relative aspect-[16/10] bg-zinc-100">
                        <img loading="lazy" src="${project.image}" class="w-full h-full object-cover" alt="${project.title}" onerror="this.src='https://picsum.photos/id/1015/800/600'">
                        <div class="absolute top-3 right-3 bg-white/90 backdrop-blur px-3 py-1 rounded-2xl text-xs font-medium">${project.type}</div>
                    </div>
                    <div class="p-5">
                        <h4 class="font-semibold text-xl tracking-tight">${project.title}</h4>
                        <p class="text-zinc-500 text-sm mt-1">${project.description}</p>
                        <div class="flex justify-between items-center mt-4">
                            <div class="text-xs px-3 py-1 bg-zinc-100 text-zinc-600 rounded-3xl font-medium">${project.year}</div>
                            <button onclick="event.stopImmediatePropagation(); showModal(${project.id})" class="text-xs font-medium px-4 py-1.5 rounded-3xl border border-zinc-200 hover:bg-zinc-50">View</button>
                        </div>
                    </div>
                `;
                card.onclick = () => showModal(project.id);
                grid.appendChild(card);
            });
        }

        function showModal(id) {
            const project = projects.find(p => p.id === id);
            if (!project) return;
            document.getElementById('modal-title').textContent = project.title;
            document.getElementById('modal-category').textContent = project.type;
            document.getElementById('modal-image').src = project.image;
            document.getElementById('modal-description').innerHTML = `<div class="mb-2">${project.description}</div><div class="text-sm text-zinc-500">${project.details}</div>`;
            document.getElementById('modal-details').innerHTML = `<div><strong>Year:</strong> ${project.year}</div><div><strong>Category:</strong> ${project.type}</div>`;
            const toolsEl = document.getElementById('modal-tools');
            toolsEl.innerHTML = '';
            project.tools.forEach(t => {
                const span = document.createElement('span');
                span.className = 'text-xs px-3 py-1 bg-zinc-100 text-zinc-700 rounded-2xl mr-1 mb-1';
                span.textContent = t;
                toolsEl.appendChild(span);
            });
            const link = document.getElementById('modal-behance-link');
            link.href = "https://www.behance.net/creativenab";
            link.target = "_blank";
            document.getElementById('project-modal').classList.remove('hidden');
            document.getElementById('project-modal').classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('project-modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        window.onload = () => {
            renderProjects();
            document.addEventListener('keydown', e => { if (e.key === "Escape") closeModal(); });
        };
    </script>
