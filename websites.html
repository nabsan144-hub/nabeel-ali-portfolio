<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Website Design • Nabeel Ali • CreativeNab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .heading-font { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; }
        .project-card { transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1); }
        .project-card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-white text-zinc-900">
    <nav class="bg-white border-b border-zinc-100 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <a href="portfolio.html" class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-zinc-900 rounded-2xl flex items-center justify-center">
                        <span class="text-white font-bold text-2xl tracking-tighter">NA</span>
                    </div>
                    <div>
                        <div class="font-semibold text-2xl tracking-tighter">Nabeel Ali</div>
                        <div class="text-[10px] text-zinc-500 -mt-1 tracking-[1.5px]">CREATIVE NAB</div>
                    </div>
                </a>
            </div>
            <div class="flex items-center gap-x-4">
                <a href="portfolio.html" class="px-5 py-2 text-sm font-medium text-zinc-600 hover:text-zinc-900">All Work</a>
                <a href="https://www.behance.net/creativenab" target="_blank" rel="noopener noreferrer" class="px-5 py-2.5 text-sm font-semibold rounded-3xl border border-zinc-200 hover:bg-zinc-50 flex items-center gap-x-2">
                    <i class="fab fa-behance"></i> Behance
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-8 pt-12 pb-16">
        <div class="flex items-center justify-between mb-8">
            <div>
                <a href="portfolio.html" class="text-xs text-zinc-500 hover:text-zinc-700 flex items-center gap-x-1">
                    <i class="fas fa-arrow-left"></i> <span>Back to Portfolio</span>
                </a>
                <h1 class="heading-font text-6xl font-bold tracking-tighter mt-2">Website Design</h1>
                <p class="text-zinc-500 mt-1">15 premium website designs</p>
            </div>
            <div class="text-right">
                <span class="px-5 py-2 bg-zinc-100 text-zinc-700 rounded-3xl text-sm font-medium">15 Projects</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="projects-grid"></div>
    </div>

    <div id="project-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-4" onclick="closeModal()">
        <div onclick="event.stopImmediatePropagation()" class="bg-white w-full max-w-5xl max-h-[92vh] overflow-auto rounded-3xl shadow-2xl">
            <div class="p-8 md:p-10">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <div id="modal-category" class="uppercase text-xs tracking-[2px] font-semibold text-zinc-500"></div>
                        <h3 id="modal-title" class="heading-font text-4xl md:text-5xl font-bold tracking-tighter mt-1"></h3>
                    </div>
                    <button onclick="closeModal()" class="text-3xl text-zinc-300 hover:text-zinc-900">×</button>
                </div>
                <div class="grid md:grid-cols-5 gap-8">
                    <div class="md:col-span-3">
                        <img id="modal-image" class="w-full rounded-2xl shadow-xl border border-zinc-100" alt="">
                    </div>
                    <div class="md:col-span-2">
                        <div class="space-y-6">
                            <div>
                                <div class="text-xs uppercase tracking-widest text-zinc-500 mb-1">PROJECT OVERVIEW</div>
                                <div id="modal-description" class="text-lg leading-relaxed text-zinc-700"></div>
                            </div>
                            <div>
                                <div class="text-xs uppercase tracking-widest text-zinc-500 mb-2">KEY DETAILS</div>
                                <div id="modal-details" class="text-sm space-y-1 text-zinc-700"></div>
                            </div>
                            <div>
                                <div class="text-xs uppercase tracking-widest text-zinc-500 mb-2">TOOLS &amp; SKILLS</div>
                                <div id="modal-tools" class="flex flex-wrap gap-2"></div>
                            </div>
                        </div>
                        <div class="mt-8 pt-6 border-t">
                            <a id="modal-behance-link" href="https://www.behance.net/creativenab" target="_blank" rel="noopener noreferrer"
                               class="inline-flex items-center gap-x-2 px-5 py-3 text-sm font-semibold border border-zinc-300 rounded-3xl hover:bg-zinc-50 w-full justify-center">
                                View on Behance <i class="fas fa-external-link-alt text-xs ml-1"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const projects = [
            { id: 43, title: "Nova Finance", category: "website", type: "Website Design", image: "05_Website_Design/01_Nova_Finance.jpg", description: "Premium fintech landing page.", details: "Modern and trustworthy design for smart investing.", tools: ["Photoshop", "Figma"], year: "2026" },
            { id: 44, title: "Bloom Wellness", category: "website", type: "Website Design", image: "05_Website_Design/02_Bloom_Wellness.jpg", description: "Calming wellness platform.", details: "Soft, elegant UI for health and mindfulness.", tools: ["Photoshop"], year: "2026" },
            { id: 45, title: "Forge Studio", category: "website", type: "Website Design", image: "05_Website_Design/03_Forge_Studio.jpg", description: "Creative agency website.", details: "Bold and dynamic design for creative agency.", tools: ["Photoshop", "Figma"], year: "2026" },
            { id: 46, title: "Orbit Travel", category: "website", type: "Website Design", image: "05_Website_Design/04_Orbit_Travel.jpg", description: "Luxury travel booking site.", details: "Beautiful and functional travel experience.", tools: ["Photoshop"], year: "2026" },
            { id: 47, title: "Pulse Fitness", category: "website", type: "Website Design", image: "05_Website_Design/05_Pulse_Fitness.jpg", description: "High-energy fitness platform.", details: "Bold performance-focused design.", tools: ["Photoshop"], year: "2026" },
            { id: 48, title: "Ember Coffee", category: "website", type: "Website Design", image: "05_Website_Design/06_Ember_Coffee.jpg", description: "Artisanal coffee e-commerce.", details: "Warm and premium shopping experience.", tools: ["Photoshop"], year: "2026" },
            { id: 49, title: "Apex Learning", category: "website", type: "Website Design", image: "05_Website_Design/07_Apex_Learning.jpg", description: "Online education platform.", details: "Clean and focused learning experience.", tools: ["Photoshop"], year: "2026" },
            { id: 50, title: "Lumina Beauty", category: "website", type: "Website Design", image: "05_Website_Design/08_Lumina_Beauty.jpg", description: "Premium skincare e-commerce.", details: "Elegant and luxurious beauty website.", tools: ["Photoshop"], year: "2026" },
            { id: 51, title: "Vertex Properties", category: "website", type: "Website Design", image: "05_Website_Design/09_Vertex_Properties.jpg", description: "Luxury real estate site.", details: "Sophisticated property presentation.", tools: ["Photoshop"], year: "2026" },
            { id: 52, title: "Solara Energy", category: "website", type: "Website Design", image: "05_Website_Design/10_Solara_Energy.jpg", description: "Renewable energy platform.", details: "Clean, modern sustainable tech design.", tools: ["Photoshop"], year: "2026" },
            { id: 53, title: "Echo Music", category: "website", type: "Website Design", image: "05_Website_Design/11_Echo_Music.jpg", description: "Music streaming platform.", details: "Immersive and emotional music experience.", tools: ["Photoshop"], year: "2026" },
            { id: 54, title: "Prism Analytics", category: "website", type: "Website Design", image: "05_Website_Design/12_Prism_Analytics.jpg", description: "Business intelligence dashboard.", details: "Data-driven, professional B2B design.", tools: ["Photoshop"], year: "2026" },
            { id: 55, title: "Haven Hospitality", category: "website", type: "Website Design", image: "05_Website_Design/13_Haven_Hospitality.jpg", description: "Luxury boutique hotels.", details: "Elegant and timeless hospitality website.", tools: ["Photoshop"], year: "2026" },
            { id: 56, title: "Kinetic Sports", category: "website", type: "Website Design", image: "05_Website_Design/14_Kinetic_Sports.jpg", description: "Premium sports gear site.", details: "Bold, performance-oriented design.", tools: ["Photoshop"], year: "2026" },
            { id: 57, title: "Vesper Jewels", category: "website", type: "Website Design", image: "05_Website_Design/15_Vesper_Jewels.jpg", description: "Luxury jewelry e-commerce.", details: "Refined and elegant jewelry shopping.", tools: ["Photoshop"], year: "2026" }
        ];

        function renderProjects() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';
            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card bg-white border border-zinc-100 rounded-3xl overflow-hidden cursor-pointer';
                card.innerHTML = `
                    <div class="relative aspect-[16/10] bg-zinc-100">
                        <img loading="lazy" src="${project.image}" class="w-full h-full object-cover" alt="${project.title}" onerror="this.src='https://picsum.photos/id/1015/800/600'">
                        <div class="absolute top-3 right-3 bg-white/90 backdrop-blur px-3 py-1 rounded-2xl text-xs font-medium">${project.type}</div>
                    </div>
                    <div class="p-5">
                        <h4 class="font-semibold text-xl tracking-tight">${project.title}</h4>
                        <p class="text-zinc-500 text-sm mt-1">${project.description}</p>
                        <div class="flex justify-between items-center mt-4">
                            <div class="text-xs px-3 py-1 bg-zinc-100 text-zinc-600 rounded-3xl font-medium">${project.year}</div>
                            <button onclick="event.stopImmediatePropagation(); showModal(${project.id})" class="text-xs font-medium px-4 py-1.5 rounded-3xl border border-zinc-200 hover:bg-zinc-50">View</button>
                        </div>
                    </div>
                `;
                card.onclick = () => showModal(project.id);
                grid.appendChild(card);
            });
        }

        function showModal(id) {
            const project = projects.find(p => p.id === id);
            if (!project) return;
            document.getElementById('modal-title').textContent = project.title;
            document.getElementById('modal-category').textContent = project.type;
            document.getElementById('modal-image').src = project.image;
            document.getElementById('modal-description').innerHTML = `<div class="mb-2">${project.description}</div><div class="text-sm text-zinc-500">${project.details}</div>`;
            document.getElementById('modal-details').innerHTML = `<div><strong>Year:</strong> ${project.year}</div><div><strong>Category:</strong> ${project.type}</div>`;
            const toolsEl = document.getElementById('modal-tools');
            toolsEl.innerHTML = '';
            project.tools.forEach(t => {
                const span = document.createElement('span');
                span.className = 'text-xs px-3 py-1 bg-zinc-100 text-zinc-700 rounded-2xl mr-1 mb-1';
                span.textContent = t;
                toolsEl.appendChild(span);
            });
            const link = document.getElementById('modal-behance-link');
            link.href = "https://www.behance.net/creativenab";
            link.target = "_blank";
            document.getElementById('project-modal').classList.remove('hidden');
            document.getElementById('project-modal').classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('project-modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        window.onload = () => {
            renderProjects();
            document.addEventListener('keydown', e => { if (e.key === "Escape") closeModal(); });
        };
    </script>
